# -------------------------------------------------------------------
# Autostart Configuration
# See https://wiki.hyprland.org/Configuring/Monitors/
# -------------------------------------------------------------------
# Waybar
exec-once = ~/.dotfiles/.config/waybar/launch.sh

# Wallpaper
exec-once = hyprpaper

# HyprIdle
exec-once = hypridle

# Authenticator agent
exec-once = systemctl --user start plasma-polkit-agent

# Notifications
exec-once = swaync

exec-once = nm-applet

# Clipboard manager
# exec-once = wl-paste -t text --watch clipman store --no-persist
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data

# Autostart programs
exec-once = [workspace 1 silent;noanim;noinitialfocus] $browser
exec-once = [workspace 2 silent;noanim;noinitialfocus] $terminal
exec-once = [workspace 3 silent;noanim;noinitialfocus] $fileManager
