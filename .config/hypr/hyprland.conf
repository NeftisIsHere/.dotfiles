# Debug
debug:disable_logs = false
# -------------------------------------------------------------------
# Monitor Configuration
# See https://wiki.hyprland.org/Configuring/Monitors/
# -------------------------------------------------------------------
monitor=,1920x1080@60,auto,1.25

# -------------------------------------------------------------------
# My programs & Variables
# -------------------------------------------------------------------

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = firefox

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# Hopefully, fixing theming...

env = QT_QPA_PLATFORM,wayland # change to qt6ct if you have that
env = QT_QPA_PLATFORMTHEME,qt6ct

# -------------------------------------------------------------------
#  Auto Start Applications
# -------------------------------------------------------------------
source = $dotconf/hypr/config/autostart.conf

# -------------------------------------------------------------------
# Binds 
# -------------------------------------------------------------------
source = $dotconf/hypr/config/binds.conf

# -------------------------------------------------------------------
# Keyboard & Mouse Settings
# See https://wiki.hyprland.org/Configuring/Variables
# -------------------------------------------------------------------

source = $dotconf/hypr/config/input_devices.conf

input {
    numlock_by_default = true
    
	# Mouse settings
    touchpad {
        natural_scroll = true
		scroll_factor = 0.2
	}		
	follow_mouse = 1
	sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
	accel_profile = flat
}
gestures {
    workspace_swipe = on	
}




# -------------------------------------------------------------------
# General Settings (Look & Feel)
# See https://wiki.hyprland.org/Configuring/Variables/ 
# -------------------------------------------------------------------
general {
    gaps_in = 3
    gaps_out = 5
    no_border_on_floating = true
    resize_on_border = false 
    border_size = 1
    col.active_border = rgba(8EC07Cee) rgba(5fb441ee) 45deg
    col.inactive_border = rgba(a89980a1)
    layout = dwindle
    allow_tearing = false
}

# -------------------------------------------------------------------
# Decoration Settings 
# See https://wiki.hyprland.org/Configuring/Variables/
# -------------------------------------------------------------------
decoration {
    rounding = 3
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    active_opacity = 1
    inactive_opacity = 0.975
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# -------------------------------------------------------------------
# Animations Settings 
# See https://wiki.hyprland.org/Configuring/Animations/
# -------------------------------------------------------------------
animations {
    enabled = yes
    first_launch_animation = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 0
    animation = fade, 1, 7, default
    animation = workspaces, 1, 1, default
}

# -------------------------------------------------------------------
# Layout Settings
# See https://wiki.hyprland.org/configuring/dwindle-layout/
# See https://wiki.hyprland.org/configuring/master-layout/
# -------------------------------------------------------------------
dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
    new_status = master
}

# -------------------------------------------------------------------
# Misc Settings
# See https://wiki.hyprland.org/configuring/variables/#misc
# -------------------------------------------------------------------
misc {
    force_default_wallpaper = 1 
    disable_hyprland_logo = true
}

# ------------------------------------------------------------------
# XWayland Configs
# See https://wiki.hyprland.org/configuring/xwayland/
# ------------------------------------------------------------------
# unscale XWayland
xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE,1.25

# -------------------------------------------------------------------
# Window Rules
# -------------------------------------------------------------------
source = $dotconf/hypr/config/window_rules.conf 
