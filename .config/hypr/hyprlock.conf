general {
    ignore_empty_input = true
}
# Wallpaper
background {
    monitor =
    path = $DOTFILES/wallpaper/wallpaper.png
    color = rgba(25, 20, 20, 0.9)
    blur_passes = 1
    blur_size = 6
    noise = 0.013
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# PASSWORD BAR
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    placeholder_text = <i><span foreground="##eeeeee">Input Your Password...</span></i>
    hide_input = false
    position = 0, 40
    halign = center
    valign = bottom
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%T")"
    #color = $foreground
    color = rgba(255, 255, 255, 0.6)
    font_size = 120
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -300
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%D")" 
	#color = $foreground
    color = rgba(255, 255, 255, 0.6)
    font_size = 30
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -500
    halign = center
    valign = top
}

# USER
label {
	monitor =
	text = Welcome back, $USER:
	color = rgba (255,255,255, 0.6)
	font_size = 20
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
	position = 2, 105
	halign = center 
	valign = bottom
}
